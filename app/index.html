<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大阪陣取り合戦</title>
    <meta name="theme-color" content="#277c74" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="大阪陣取り合戦" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="大阪陣取り合戦マップ">
        <div class="topbar">
          <div>
            <p class="eyebrow">Osaka City Visit Map</p>
            <h1>大阪陣取り合戦</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span id="visitedCount">0%</span><small id="totalCount">制圧率</small>
          </div>
        </div>

        <div class="progress-wrap" aria-label="進捗">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="map-wrap">
          <div id="osakaMap" role="application" aria-label="OpenStreetMapを使った大阪市100mメッシュのぬりつぶしマップ"></div>
        </div>
      </section>

      <aside class="side-panel" aria-label="操作パネル">
        <div class="status-block">
          <p class="label">次の目標</p>
          <h2 id="nextGoal">まずは1%</h2>
          <p id="message">現在地を取得した場所から半径300m以内の100mマスに色がつきます。</p>
        </div>

        <div class="actions">
          <button id="locateBtn" type="button">現在地で塗る</button>
          <button id="resetBtn" type="button" class="secondary">リセット</button>
        </div>

        <section class="share-panel" aria-label="共有ランキング">
          <div class="list-header">
            <p class="label">ランキング</p>
            <button id="syncBtn" type="button" class="text-button">同期</button>
          </div>
          <form id="playerForm" class="player-form">
            <input id="playerName" type="text" maxlength="18" autocomplete="nickname" placeholder="名前" aria-label="ランキングに表示する名前" />
            <button type="submit">保存</button>
          </form>
          <p id="shareStatus" class="share-status">Supabase未設定です。</p>
          <ol id="leaderboard" class="leaderboard"></ol>
        </section>

        <div class="ward-list-wrap">
          <div class="list-header">
            <p class="label">おすすめスポット</p>
            <button id="randomBtn" type="button" class="text-button">おすすめスポット</button>
          </div>
          <div id="wardList" class="ward-list"></div>
        </div>
      </aside>
    </main>

    <button id="testModeBtn" class="test-mode-control" type="button" aria-label="テストモードを有効化">テスト</button>
    <div id="testModePanel" class="test-mode-panel" hidden>
      <form id="testModeForm" class="test-mode-form">
        <label for="testModePassword">テストパスワード</label>
        <input id="testModePassword" type="password" inputmode="text" autocomplete="off" />
        <div class="test-mode-actions">
          <button id="testModeCancel" type="button" class="secondary">閉じる</button>
          <button type="submit">開始</button>
        </div>
      </form>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js");
        });
      }
    </script>
  </body>
</html>
