<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大阪陣取り合戦</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="大阪陣取り合戦マップ">
        <div class="topbar">
          <div>
            <p class="eyebrow">Osaka City Visit Map</p>
            <h1>大阪陣取り合戦</h1>
          </div>
          <div class="score-card" aria-live="polite">
            <span id="visitedCount">0%</span><small id="totalCount">制圧率</small>
          </div>
        </div>

        <div class="progress-wrap" aria-label="進捗">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="map-wrap">
          <div id="osakaMap" role="application" aria-label="OpenStreetMapを使った大阪市100mメッシュのぬりつぶしマップ"></div>
        </div>
      </section>

      <aside class="side-panel" aria-label="操作パネル">
        <div class="status-block">
          <p class="label">次の目標</p>
          <h2 id="nextGoal">まずは1%</h2>
          <p id="message">行った場所の100mマスを地図から選ぶと色がつきます。</p>
        </div>

        <div class="actions">
          <button id="locateBtn" type="button">現在地で塗る</button>
          <button id="resetBtn" type="button" class="secondary">リセット</button>
        </div>

        <div class="ward-list-wrap">
          <div class="list-header">
            <p class="label">メッシュ設定</p>
            <button id="randomBtn" type="button" class="text-button">候補を出す</button>
          </div>
          <div id="wardList" class="ward-list"></div>
        </div>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
  </body>
</html>
